<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dumpy</title>
    <link rel="icon" href="/dumpy-mascot.png?v=3">
    <link rel="apple-touch-icon" href="/dumpy-mascot.png?v=3">
    <link rel="stylesheet" href="/styles.css?v=26">
    <script src="/app.js?v=26" type="module"></script>
  </head>
  <body>
    <main class="shell">
      <header class="mast">
        <button class="mascot" id="mascotButton" type="button" data-face="idle" aria-label="Refresh dumps with Dumpy">
          <img
            class="mark"
            alt="Dirty buck-toothed file mascot"
            width="64"
            height="64"
            src="/mascots/dumpy-idle.svg?v=2"
          >
          <span class="bubble">Oopsie!</span>
        </button>
        <div>
          <h1>Dumpy</h1>
        </div>
      </header>

      <section class="quick-dump">
        <form class="dump-form" id="dumpForm">
          <label class="sr-only" for="dumpInput">Link or text</label>
          <textarea id="dumpInput" rows="4" placeholder="Paste a link or text"></textarea>
          <button class="dump-button" type="submit">Dump</button>
        </form>
      </section>

      <section class="party-tools" aria-label="Dump party tools">
        <form class="party-form" id="partyForm">
          <label class="sr-only" for="partyName">New dump party</label>
          <input id="partyName" type="text" maxlength="120" placeholder="Name a dump party">
          <button class="quiet-button" type="submit">Make party</button>
        </form>
        <div class="active-party">
          <span>Dumping into <strong id="activePartyLabel">Loose Dumps</strong></span>
          <button class="quiet-button" id="clearPartyButton" type="button" hidden>Use Loose Dumps</button>
        </div>
      </section>

      <section class="drop-zone" id="dropZone">
        <input id="fileInput" class="file-input" type="file" multiple aria-hidden="true" tabindex="-1">
        <input id="folderInput" class="file-input" type="file" webkitdirectory multiple aria-hidden="true" tabindex="-1">
        <button class="choose-button" id="chooseButton" type="button">Choose dumpfile</button>
        <button class="quiet-button folder-button" id="chooseFolderButton" type="button">Choose dump folder</button>
        <p class="drop-title">Dump files here</p>
        <p class="drop-note">Every device gets the dump.</p>
        <div class="progress" aria-hidden="true">
          <span id="progressBar"></span>
        </div>
      </section>

      <section class="party-section" id="partySection" hidden>
        <div class="section-head">
          <div>
            <h2>Dump Parties <span id="partyCount"></span></h2>
            <p>Pick one to aim the dump box and file drop there.</p>
          </div>
          <button class="quiet-button section-toggle flush-toggle" id="partyToggle" type="button" aria-controls="partyList" aria-expanded="true" aria-label="Collapse dump parties" title="Collapse dump parties"></button>
        </div>
        <ul class="file-list party-list" id="partyList"></ul>
      </section>

      <section class="toolbar" aria-live="polite">
        <p id="statusText">Ready.</p>
      </section>

      <section>
        <div class="section-head dumps-head">
          <h2 class="list-title" id="itemListTitle">Loose Dumps</h2>
          <button class="quiet-button section-toggle flush-toggle" id="dumpsToggle" type="button" aria-controls="fileList" aria-expanded="true" aria-label="Collapse dumps" title="Collapse dumps"></button>
        </div>
        <ul class="file-list" id="fileList"></ul>
      </section>

      <footer class="storage-footer">
        <p id="storagePath">Storage loading.</p>
      </footer>

      <section class="deleted-space" id="deletedSpace" hidden>
        <div class="deleted-head">
          <h2>Recently deleted <span id="deletedCount"></span></h2>
          <p>Held for 30 days.</p>
        </div>
        <ul class="file-list deleted-list" id="deletedList"></ul>
      </section>
    </main>

    <section class="preview-overlay" id="previewOverlay" role="dialog" aria-modal="true" aria-labelledby="previewTitle" hidden>
      <div class="preview-panel" tabindex="-1">
        <header class="preview-header">
          <h2 id="previewTitle">Preview</h2>
          <button class="icon-button preview-close" id="previewClose" type="button" aria-label="Close preview">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 6l12 12"></path>
              <path d="M18 6L6 18"></path>
            </svg>
          </button>
        </header>
        <div class="preview-body" id="previewBody"></div>
        <footer class="preview-footer">
          <a class="download-link" id="previewDownload" href="#">Download</a>
        </footer>
      </div>
    </section>

    <section class="confirm-overlay" id="confirmOverlay" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" hidden>
      <div class="confirm-panel" tabindex="-1">
        <h2 id="confirmTitle">Ya sure?</h2>
        <p id="confirmDetail"></p>
        <div class="confirm-actions">
          <button class="quiet-button" id="confirmNo" type="button">No</button>
          <button class="dump-button" id="confirmYes" type="button">Yes</button>
        </div>
      </div>
    </section>
  </body>
</html>
